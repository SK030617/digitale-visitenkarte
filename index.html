<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Susanne Kraller | Raiffeisenbank Wörthersee‑Landskron‑Gegendtal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:white;
}

.hero{
min-height:100vh;
background-image:url("velden.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.overlay{
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:30px 20px;
border-radius:14px;
text-align:center;
width:100%;
max-width:420px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* Bilder flexibel */
.logo,
.slogan{
width:100%;
max-width:320px;
height:auto;
margin-bottom:20px;
}

/* Typography responsive */
h1{
margin:5px 0;
font-size:26px;
font-weight:700;
}

h2{
margin:0 0 20px 0;
font-size:16px;
color:#fbf315;
font-weight:400;
}

.company{
font-size:13px;
opacity:0.9;
margin-bottom:20px;
}

.contact{
font-size:15px;
line-height:1.6;
margin-bottom:25px;
}

/* Buttons */
.button{
display:block;
margin:10px auto;
padding:12px;
width:100%;
max-width:280px;
background:#fbf315;
color:#000;
font-weight:600;
border-radius:8px;
text-decoration:none;
transition:all 0.25s ease;
}

.button:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

.secondary{
background:white;
}

/* Social */
.social{
margin-top:20px;
}

.social a{
margin:0 8px;
color:white;
font-size:13px;
text-decoration:none;
opacity:0.85;
}

/* QR */
.qr{
margin-top:25px;
}

.qr img{
width:120px;
max-width:100%;
border-radius:6px;
background:white;
padding:6px;
}

/* Footer */
footer{
margin-top:15px;
font-size:11px;
opacity:0.6;
}

/* ===== DESKTOP OPTIMIERUNG ===== */
@media (min-width:768px){

.overlay{
padding:50px 40px;
}

.logo,
.slogan{
max-width:430px;
}

h1{
font-size:32px;
}

h2{
font-size:18px;
}

.contact{
font-size:16px;
}

.button{
max-width:320px;
padding:14px;
}

.qr img{
width:140px;
}

footer{
font-size:12px;
}
}

</style>
</head>
<body>

<div class="hero">

<div class="overlay">

<img src="Logo_weiss.png" class="logo" alt="Raiffeisenbank Logo">

<h1>Susanne Kraller</h1>
<h2>Marketing</h2>

<div class="company">
Raiffeisenbank Wörthersee‑Landskron‑Gegendtal
</div>

<div class="contact">
📞 +43 664 1234567<br>
✉ susanne.kraller@rb39390.at<br>
🌐 www.rb39390.at<br>
📍 Landskron
</div>

<a class="button" href="susanne_kraller.vcf">Kontakt speichern</a>
<a class="button secondary" href="https://www.rb39390.at">Website besuchen</a>

<div class="social">
<a href="https://www.linkedin.com/in/susannekraller">LinkedIn</a>
</div>

<img src="qr_code.png" alt="QR Code">
<div style="margin-top:8px;font-size:13px"></div>
</div-->

<footer>
<img src="slogan.png" class="slogan" alt="Willkommen bei uns">

</footer>

</div>

</div>

</body>
</html>
